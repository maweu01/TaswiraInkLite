# ═══════════════════════════════════════════════════════
# Taswira Space Ink v2 — Nginx Production Config
# ═══════════════════════════════════════════════════════

server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── Gzip Compression ────────────────────────────────
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_min_length    1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # ── Security Headers ─────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                         always;
    add_header X-Content-Type-Options    "nosniff"                            always;
    add_header X-XSS-Protection         "1; mode=block"                      always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"    always;
    add_header Permissions-Policy       "geolocation=(self)"                  always;
    add_header Content-Security-Policy
        "default-src 'self' https:; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://nominatim.openstreetmap.org https://tiles.openfreemap.org https://api.anthropic.com https://fonts.googleapis.com https://fonts.gstatic.com;"
        always;

    # ── Static Asset Caching ─────────────────────────────
    location ~* \.(woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── ES Module Support ────────────────────────────────
    location ~* \.js$ {
        add_header Content-Type "application/javascript; charset=utf-8";
    }

    # ── SPA Fallback ─────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Health Check Endpoint ─────────────────────────────
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"taswira-space-ink"}';
        add_header Content-Type application/json;
    }

    # ── Error Pages ───────────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;

    # ── Remove server tokens ──────────────────────────────
    server_tokens off;
}
